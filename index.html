<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice fetch agent — performance dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafaf8;--surface:#fff;--surface2:#f3f2ef;--text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a;--border:#e5e4e0;--success:#1a8a5f;--login:#3266ad;--captcha:#c47f17;--fetch:#c0502a;--blocked:#a32d2d;--seg-pw:#3266ad;--seg-cu:#1a8a5f;--seg-in:#7B61B8;--radius:10px;--font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace}
@media(prefers-color-scheme:dark){:root{--bg:#161616;--surface:#1e1e1e;--surface2:#2a2a2a;--text:#e8e8e8;--text2:#999;--text3:#666;--border:#333;--success:#3cc88a;--login:#6fa3e0;--captcha:#e0b050;--fetch:#e08060;--blocked:#e06060;--seg-pw:#6fa3e0;--seg-cu:#3cc88a;--seg-in:#a78bfa}}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem;max-width:1100px;margin:0 auto}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:8px}
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:1.5rem;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-row label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;width:65px;flex-shrink:0}
.filter-row input[type=date]{font-family:var(--font);font-size:12px;padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none}
.filter-row input[type=date]:focus{border-color:var(--text3)}
.pill{font-family:var(--font);font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--text3)}
.pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.pill-seg[data-seg=payhawk_live].active{background:var(--seg-pw);border-color:var(--seg-pw);color:#fff}
.pill-seg[data-seg=customer_live].active{background:var(--seg-cu);border-color:var(--seg-cu);color:#fff}
.pill-seg[data-seg=internal].active{background:var(--seg-in);border-color:var(--seg-in);color:#fff}
.acct-search{font-family:var(--font);font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);width:220px;outline:none}
.acct-search:focus{border-color:var(--text3)}
.active-filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.active-tag{font-size:10px;padding:3px 8px 3px 10px;border-radius:12px;background:var(--surface2);color:var(--text2);display:flex;align-items:center;gap:4px}
.active-tag .x{cursor:pointer;font-weight:600;font-size:12px;color:var(--text3);line-height:1}
.active-tag .x:hover{color:var(--text)}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:2rem}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0.85rem 1rem}
.metric-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.metric-val{font-size:22px;font-weight:600;font-family:var(--mono);line-height:1.1}
.metric-sub{font-size:10px;color:var(--text2);margin-top:3px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:2rem}
@media(max-width:700px){.charts{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.panel-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-bottom:5px}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.controls button{font-family:var(--font);font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.controls button:hover{border-color:var(--text3)}
.controls button.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;height:22px}
.bar-name{width:145px;font-size:11px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;height:18px;display:flex;border-radius:3px;overflow:hidden;background:var(--surface2)}
.bar-segment{height:100%;transition:width .3s ease}
.bar-attempts{font-size:10px;color:var(--text3);width:32px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.bar-row:hover .bar-name{color:var(--text)}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid var(--border);overflow-x:auto}
.tab-bar button{font-family:var(--font);font-size:13px;font-weight:500;padding:8px 20px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab-bar button.active{color:var(--text);border-bottom-color:var(--text)}
.tab-bar button:hover{color:var(--text2)}
.tab-content{display:none}.tab-content.active{display:block}
.seg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:500px){.seg-grid{grid-template-columns:1fr}}
.seg-card{border-radius:var(--radius);padding:1rem;border:1px solid var(--border);background:var(--surface)}
.seg-card .seg-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.seg-card .seg-val{font-size:24px;font-weight:600;font-family:var(--mono)}
.seg-card .seg-pct{font-size:11px;color:var(--text2);margin-top:3px}
.footer{margin-top:2rem;text-align:center;font-size:11px;color:var(--text3)}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.tbl th{text-align:left;padding:8px 10px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;font-size:11px}
.tbl th:hover{color:var(--text)}
.tbl td{padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tbody tr:hover{background:var(--surface2)}
.tbl tbody tr.acct-row{cursor:pointer}
.tbl tbody tr.acct-row td:first-child{position:relative;padding-left:22px}
.tbl tbody tr.acct-row td:first-child::before{content:'\25B8';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);transition:transform .15s}
.tbl tbody tr.acct-row.expanded td:first-child::before{transform:translateY(-50%) rotate(90deg)}
.detail-row{display:none}
.detail-row.show{display:table-row}
.detail-row td{padding:0 !important;border-bottom:1px solid var(--border)}
.detail-panel{padding:12px 16px 16px 32px;background:var(--surface2)}
.detail-panel .dp-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.dp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.dp-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.dp-card-name{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;font-family:var(--mono)}
.dp-bar{width:80px;height:8px;border-radius:4px;overflow:hidden;display:flex;background:var(--surface2);flex-shrink:0}
.dp-bar-seg{height:100%}
.dp-attempts{font-size:10px;color:var(--text3);font-family:var(--mono);width:20px;text-align:right;flex-shrink:0}
.dp-date{font-size:10px;color:var(--text3);flex-shrink:0}
.search-box{font-family:var(--font);font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);width:200px;outline:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
</style>
</head>
<body>
<h1>Invoice fetch agent &#8212; performance dashboard</h1>
<p class="subtitle" id="subtitle"></p>

<div class="filter-bar">
  <div class="filter-row">
    <label>Period</label>
    <input type="date" id="df-from">
    <span style="color:var(--text3);font-size:12px">to</span>
    <input type="date" id="df-to">
    <button class="pill" id="df-apply">Apply</button>
    <button class="pill" id="df-7d">7 days</button>
    <button class="pill" id="df-14d">14 days</button>
    <button class="pill active" id="df-all">All time</button>
  </div>
  <div class="filter-row">
    <label>Segment</label>
    <button class="pill pill-seg active" data-seg="all">All</button>
    <button class="pill pill-seg" data-seg="payhawk_live">Payhawk live</button>
    <button class="pill pill-seg" data-seg="customer_live">Customer live</button>
    <button class="pill pill-seg" data-seg="internal">Internal testing</button>
  </div>
  <div class="filter-row">
    <label>Account</label>
    <input type="text" class="acct-search" id="acct-global-search" placeholder="Search account...">
    <div class="active-filters" id="active-acct-tags"></div>
  </div>
</div>

<div class="tab-bar" id="tabs">
  <button class="active" data-tab="overview">Overview</button>
  <button data-tab="merchants">Merchant success rates</button>
  <button data-tab="composition">Composition</button>
  <button data-tab="details">Accounts &amp; merchants</button>
</div>

<div class="tab-content active" id="tab-overview">
  <div class="metrics" id="metrics"></div>
  <div class="charts">
    <div class="panel"><div class="panel-title">Outcome distribution</div><div style="position:relative;width:220px;height:220px;margin:0 auto"><canvas id="donut" width="220" height="220"></canvas></div><div id="donut-legend" style="margin-top:12px"></div></div>
    <div class="panel"><div class="panel-title">Failure funnel (absolute counts)</div><div style="position:relative;width:100%;height:220px"><canvas id="funnel"></canvas></div></div>
  </div>
  <div class="panel"><div class="panel-title">Daily attempts &amp; success</div><div style="position:relative;width:100%;height:200px"><canvas id="dailyChart"></canvas></div></div>
</div>

<div class="tab-content" id="tab-merchants">
  <div class="header-row"><div class="panel-title" style="margin-bottom:0">Outcome breakdown by merchant</div>
    <div class="controls" id="merch-controls"><button class="active" data-f="top">Top 20</button><button data-f="success">Highest success</button><button data-f="blocked">Most blocked</button><button data-f="all">All</button></div>
  </div>
  <div id="bars"></div>
  <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:11px;color:var(--text2)" id="bar-legend"></div>
</div>

<div class="tab-content" id="tab-composition">
  <div class="seg-grid" id="seg-cards"></div>
  <div class="charts">
    <div class="panel"><div class="panel-title">Testing composition</div><div style="position:relative;width:200px;height:200px;margin:0 auto"><canvas id="segDonut" width="200" height="200"></canvas></div><div id="seg-legend" style="margin-top:12px"></div></div>
    <div class="panel"><div class="panel-title">Daily volume by segment</div><div style="position:relative;width:100%;height:220px"><canvas id="segDaily"></canvas></div></div>
  </div>
</div>

<div class="tab-content" id="tab-details">
  <p style="font-size:11px;color:var(--text3);margin-bottom:10px">Click any account row to see merchant-level details</p>
  <div style="overflow-x:auto"><table class="tbl" id="acct-tbl"><thead><tr id="acct-header"></tr></thead><tbody id="acct-body"></tbody></table></div>
  <div style="margin-top:2rem">
    <div class="header-row"><div class="panel-title" style="margin-bottom:0">Merchant-level breakdown</div><input type="text" id="merchant-search" class="search-box" placeholder="Search merchants..."></div>
    <div style="overflow-x:auto"><table class="tbl"><thead><tr id="merch-header"></tr></thead><tbody id="merch-body"></tbody></table></div>
  </div>
</div>

<div class="footer" id="footer"></div>

// Global filter state

let gDateFrom=minDate, gDateTo=maxDate, gSeg='all', gAccounts=[];

document.getElementById('df-from').value=minDate;

document.getElementById('df-from').min=minDate;document.getElementById('df-from').max=maxDate;
document.getElementById('df-to').min=minDate;document.getElementById('df-to').max=maxDate;

function getFiltered(){
  let d=RAW.filter(r=>r.dt>=gDateFrom&&r.dt<=gDateTo);
  if(gSeg!=='all') d=d.filter(r=>r.seg===gSeg);
  if(gAccounts.length) d=d.filter(r=>gAccounts.includes(r.aid));
  return d;
}
function refresh(){rebuildAll(getFiltered());}

// Date controls
document.getElementById('df-apply').addEventListener('click',()=>{
  document.querySelectorAll('#df-7d,#df-14d,#df-all').forEach(b=>b.classList.remove('active'));
  gDateFrom=document.getElementById('df-from').value;gDateTo=document.getElementById('df-to').value;refresh();
});
document.getElementById('df-all').addEventListener('click',e=>{
  document.querySelectorAll('#df-7d,#df-14d,#df-all').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');
  gDateFrom=minDate;gDateTo=maxDate;document.getElementById('df-from').value=minDate;document.getElementById('df-to').value=maxDate;refresh();
});
function quickDate(days,btn){
  document.querySelectorAll('#df-7d,#df-14d,#df-all').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const d=new Date(maxDate);d.setDate(d.getDate()-days+1);gDateFrom=d.toISOString().slice(0,10);gDateTo=maxDate;
  document.getElementById('df-from').value=gDateFrom;document.getElementById('df-to').value=gDateTo;refresh();
}
document.getElementById('df-7d').addEventListener('click',e=>quickDate(7,e.target));
document.getElementById('df-14d').addEventListener('click',e=>quickDate(14,e.target));

}));

// Account search with tags
const acctInput=document.getElementById('acct-global-search');
const acctTags=document.getElementById('active-acct-tags');
function renderAcctTags(){
  acctTags.innerHTML=gAccounts.map(a=>'<span class="active-tag">'+a.replace(/_[a-f0-9]{8}$/,'').replace(/_demo$/,'').replaceAll('_',' ')+'<span class="x" data-aid="'+a+'">\u00d7</span></span>').join('');
}
acctInput.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const q=acctInput.value.trim().toLowerCase();if(!q)return;
  const match=allAccounts.find(a=>a.toLowerCase().includes(q));
  if(match&&!gAccounts.includes(match)){gAccounts.push(match);renderAcctTags();acctInput.value='';refresh();}
  else acctInput.value='';
});
acctTags.addEventListener('click',e=>{
  const x=e.target.closest('.x');if(!x)return;
  gAccounts=gAccounts.filter(a=>a!==x.dataset.aid);renderAcctTags();refresh();
});

function rebuildAll(data){

  dc('funnel');
  const ab=[{l:'Login requested',v:tl,c:COL.l},{l:'Fetch failed',v:tf,c:COL.f},{l:'Captcha',v:tca,c:COL.ca},{l:'Agent blocked',v:tb,c:COL.b},{l:'Success',v:ts,c:COL.s}];
  charts.funnel=new Chart(document.getElementById('funnel'),{type:'bar',data:{labels:ab.map(x=>x.l),datasets:[{data:ab.map(x=>x.v),backgroundColor:ab.map(x=>x.c),borderRadius:4,barThickness:28}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x+' attempts'}}},scales:{x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10}}},y:{grid:{display:false},ticks:{color:isDk?'#ccc':'#555',font:{size:11}}}}}});

  dc('dailyChart');
  const dm={};data.forEach(r=>{if(!dm[r.dt])dm[r.dt]={a:0,s:0};dm[r.dt].a+=r.a;dm[r.dt].s+=r.s;});
  const dk=Object.keys(dm).sort();
  charts.dailyChart=new Chart(document.getElementById('dailyChart'),{type:'bar',data:{labels:dk.map(d=>d.slice(5)),datasets:[{type:'bar',label:'Attempts',data:dk.map(d=>dm[d].a),backgroundColor:isDk?'rgba(255,255,255,.12)':'rgba(0,0,0,.08)',borderRadius:3,order:2},{type:'line',label:'Success',data:dk.map(d=>dm[d].s),borderColor:COL.s,backgroundColor:COL.s+'33',pointRadius:2,pointHoverRadius:4,fill:true,tension:.3,order:1}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tickColor,font:{size:9},maxRotation:45,autoSkip:true,maxTicksLimit:15}},y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10}}}}}});

  const pa={};data.forEach(r=>{if(!pa[r.pn])pa[r.pn]={n:r.pn,a:0,s:0,l:0,ca:0,f:0,b:0};const p=pa[r.pn];p.a+=r.a;p.s+=r.s;p.l+=r.l;p.ca+=r.ca;p.f+=r.f;p.b+=r.b;});
  const D=Object.values(pa).map(p=>({n:p.n,a:p.a,s:p.a?Math.round(1000*p.s/p.a)/10:0,l:p.a?Math.round(1000*p.l/p.a)/10:0,ca:p.a?Math.round(1000*p.ca/p.a)/10:0,f:p.a?Math.round(1000*p.f/p.a)/10:0,b:p.a?Math.round(1000*p.b/p.a)/10:0}));

  const sdm={};data.forEach(r=>{if(!sdm[r.dt])sdm[r.dt]={};sdm[r.dt][r.seg]=(sdm[r.dt][r.seg]||0)+r.a;});
  const sdk=Object.keys(sdm).sort();
  charts.segDaily=new Chart(document.getElementById('segDaily'),{type:'bar',data:{labels:sdk.map(d=>d.slice(5)),datasets:segKeys.map(k=>({label:SEGLBL[k],data:sdk.map(d=>sdm[d]?.[k]||0),backgroundColor:SEGCOL[k],borderRadius:2}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:tickColor,font:{size:9},maxRotation:45,autoSkip:true,maxTicksLimit:15}},y:{stacked:true,grid:{color:gridColor},ticks:{color:tickColor,font:{size:10}}}}}});

  // DETAILS
  const segBadge=seg=>'<span class="badge" style="background:'+SEGCOL[seg]+'22;color:'+SEGCOL[seg]+'">'+SEGLBL[seg]+'</span>';
  const aa={};
  data.forEach(r=>{
    if(!aa[r.aid])aa[r.aid]={id:r.aid,seg:r.seg,a:0,s:0,l:0,ca:0,f:0,b:0,provs:{},dates:[]};
    const a=aa[r.aid];a.a+=r.a;a.s+=r.s;a.l+=r.l;a.ca+=r.ca;a.f+=r.f;a.b+=r.b;a.dates.push(r.dt);
    if(!a.provs[r.pn])a.provs[r.pn]={a:0,s:0,l:0,ca:0,f:0,b:0,dates:[]};
    const p=a.provs[r.pn];p.a+=r.a;p.s+=r.s;p.l+=r.l;p.ca+=r.ca;p.f+=r.f;p.b+=r.b;p.dates.push(r.dt);
  });
  const ACCTS=Object.values(aa).map(a=>{
    const ds=a.dates.sort();
    return{id:a.id,seg:a.seg,a:a.a,s:a.s,l:a.l,ca:a.ca,f:a.f,b:a.b,p:Object.keys(a.provs).length,first:ds[0]||'',last:ds[ds.length-1]||'',provs:a.provs};
  }).sort((a,b)=>b.a-a.a);

  const acctCols=[
    {key:'id',label:'Account',fmt:v=>v.replace(/_[a-f0-9]{8}$/,'').replace(/_demo$/,'').replaceAll('_',' ')},
    {key:'seg',label:'Segment',fmt:v=>segBadge(v)},
    {key:'a',label:'Attempts',fmt:v=>v},
    {key:'p',label:'Merchants',fmt:v=>v},
    {key:'s',label:'Success',fmt:(v,r)=>r.a?'<span style="color:'+COL.s+'">'+v+'</span> <span style="color:var(--text3)">('+Math.round(100*v/r.a)+'%)</span>':'0'},
    {key:'l',label:'Login',fmt:v=>v||''},{key:'ca',label:'Captcha',fmt:v=>v||''},{key:'f',label:'Failed',fmt:v=>v||''},{key:'b',label:'Blocked',fmt:v=>v||''},
    {key:'first',label:'First',fmt:v=>v?v.slice(5):'\u2014'},{key:'last',label:'Last',fmt:v=>v?v.slice(5):'\u2014'}
  ];
  const colSpan=acctCols.length;
  document.getElementById('acct-header').innerHTML=acctCols.map(c=>'<th data-sort="'+c.key+'">'+c.label+'</th>').join('');

  function buildDetail(provs){
    const items=Object.entries(provs).map(([name,p])=>({name,a:p.a,s:p.s,l:p.l,ca:p.ca,f:p.f,b:p.b,last:(p.dates.sort().pop()||'')})).sort((a,b)=>b.a-a.a);
    return '<div class="detail-panel"><div class="dp-title">Merchant attempts ('+items.length+')</div><div class="dp-grid">'+items.map(m=>{
      const sP=m.a?Math.round(100*m.s/m.a):0,lP=m.a?Math.round(100*m.l/m.a):0,caP=m.a?Math.round(100*m.ca/m.a):0,fP=m.a?Math.round(100*m.f/m.a):0,bP=m.a?Math.round(100*m.b/m.a):0;
      const bar=['l','ca','f','b','s'].map(k=>{const w=k==='s'?sP:k==='l'?lP:k==='ca'?caP:k==='f'?fP:bP;return w>0?'<div class="dp-bar-seg" style="width:'+w+'%;background:'+COL[k]+'"></div>':'';}).join('');
      const pill=sP>0?'<span class="dp-pill" style="background:'+COL.s+'22;color:'+COL.s+'">'+sP+'%</span>':'<span class="dp-pill" style="background:'+(fP>50?COL.f:COL.l)+'22;color:'+(fP>50?COL.f:COL.l)+'">0%</span>';
      return '<div class="dp-card"><div class="dp-card-name" title="'+m.name+'">'+m.name+'</div><div class="dp-bar">'+bar+'</div>'+pill+'<div class="dp-attempts">'+m.a+'</div><div class="dp-date">'+((m.last||'').slice(5)||'\u2014')+'</div></div>';
    }).join('')+'</div></div>';
  }

  let aSort={key:'a',dir:-1};
  function renderAcct(){
    let d=[...ACCTS];
    d.sort((a,b)=>{const av=a[aSort.key],bv=b[aSort.key];if(typeof av==='number')return(av-bv)*aSort.dir;return String(av).localeCompare(String(bv))*aSort.dir;});
    document.getElementById('acct-body').innerHTML=d.map((r,i)=>
      '<tr class="acct-row" data-idx="'+i+'">'+acctCols.map(c=>'<td>'+c.fmt(r[c.key],r)+'</td>').join('')+'</tr>'
      +'<tr class="detail-row" data-detail="'+i+'"><td colspan="'+colSpan+'">'+buildDetail(r.provs)+'</td></tr>'
    ).join('');
  }
  renderAcct();

  document.getElementById('acct-body').onclick=e=>{
    const row=e.target.closest('.acct-row');if(!row)return;
    const idx=row.dataset.idx;
    const det=document.querySelector('.detail-row[data-detail="'+idx+'"]');
    const open=det.classList.contains('show');
    document.querySelectorAll('.detail-row.show').forEach(d=>d.classList.remove('show'));
    document.querySelectorAll('.acct-row.expanded').forEach(r=>r.classList.remove('expanded'));
    if(!open){det.classList.add('show');row.classList.add('expanded');}
  };
  document.getElementById('acct-header').onclick=e=>{const th=e.target.closest('th');if(!th)return;const k=th.dataset.sort;aSort={key:k,dir:aSort.key===k?-aSort.dir:-1};renderAcct();};

  // Merchant table
  const mCols=[{key:'n',label:'Merchant'},{key:'a',label:'Attempts'},{key:'s',label:'Success %',fmt:v=>'<span style="color:'+COL.s+';font-weight:500">'+v+'%</span>'},{key:'l',label:'Login %'},{key:'ca',label:'Captcha %'},{key:'f',label:'Failed %'},{key:'b',label:'Blocked %'}];
  document.getElementById('merch-header').innerHTML=mCols.map(c=>'<th data-msort="'+c.key+'">'+c.label+'</th>').join('');
  let mSort={key:'a',dir:-1},mF='';
  function renderMerch(){
    let d=[...D];if(mF)d=d.filter(x=>x.n.toLowerCase().includes(mF));
    d.sort((a,b)=>{const av=a[mSort.key],bv=b[mSort.key];if(typeof av==='number')return(av-bv)*mSort.dir;return String(av).localeCompare(String(bv))*mSort.dir;});
    document.getElementById('merch-body').innerHTML=d.map(r=>'<tr>'+mCols.map(c=>{const v=r[c.key];return '<td>'+(c.fmt?c.fmt(v,r):(typeof v==='number'&&c.key!=='a'?(v||''):v))+'</td>';}).join('')+'</tr>').join('');
  }
  renderMerch();
  document.getElementById('merch-header').onclick=e=>{const th=e.target.closest('th');if(!th)return;const k=th.dataset.msort;mSort={key:k,dir:mSort.key===k?-mSort.dir:-1};renderMerch();};
  document.getElementById('merchant-search').oninput=e=>{mF=e.target.value.toLowerCase();renderMerch();};
}

refresh();
</script>
</body>
</html>
