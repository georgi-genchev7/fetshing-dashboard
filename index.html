<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice fetch agent — performance dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafaf8;--surface:#fff;--surface2:#f3f2ef;--text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a;--border:#e5e4e0;--success:#1a8a5f;--login:#3266ad;--reconnect:#7B61B8;--captcha:#c47f17;--fetch:#c0502a;--blocked:#a32d2d;--seg-payhawk:#3266ad;--seg-customer:#1a8a5f;--seg-internal:#7B61B8;--seg-external:#c47f17;--radius:10px;--font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace}
@media(prefers-color-scheme:dark){:root{--bg:#161616;--surface:#1e1e1e;--surface2:#2a2a2a;--text:#e8e8e8;--text2:#999;--text3:#666;--border:#333;--success:#3cc88a;--login:#6fa3e0;--reconnect:#a78bfa;--captcha:#e0b050;--fetch:#e08060;--blocked:#e06060;--seg-payhawk:#6fa3e0;--seg-customer:#3cc88a;--seg-internal:#a78bfa;--seg-external:#e0b050}}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem;max-width:1100px;margin:0 auto}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:4px}
.date-range{font-size:12px;color:var(--text3);margin-bottom:1.5rem}
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:2rem}
@media(max-width:800px){.metrics{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0.85rem 1rem}
.metric-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.metric-val{font-size:22px;font-weight:600;font-family:var(--mono);line-height:1.1}
.metric-sub{font-size:10px;color:var(--text2);margin-top:3px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:2rem}
@media(max-width:700px){.charts{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.panel-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-bottom:5px}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.controls button{font-family:var(--font);font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.controls button:hover{border-color:var(--text3)}
.controls button.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;height:22px}
.bar-name{width:145px;font-size:11px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;height:18px;display:flex;border-radius:3px;overflow:hidden;background:var(--surface2)}
.bar-segment{height:100%;transition:width .3s ease}
.bar-attempts{font-size:10px;color:var(--text3);width:32px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.bar-row:hover .bar-name{color:var(--text)}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.section{margin-bottom:2rem}
.tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid var(--border)}
.tab-bar button{font-family:var(--font);font-size:13px;font-weight:500;padding:8px 20px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-bar button.active{color:var(--text);border-bottom-color:var(--text)}
.tab-bar button:hover{color:var(--text2)}
.tab-content{display:none}
.tab-content.active{display:block}
.seg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:600px){.seg-grid{grid-template-columns:repeat(2,1fr)}}
.seg-card{border-radius:var(--radius);padding:1rem;border:1px solid var(--border);background:var(--surface)}
.seg-card .seg-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.seg-card .seg-val{font-size:24px;font-weight:600;font-family:var(--mono)}
.seg-card .seg-pct{font-size:11px;color:var(--text2);margin-top:3px}
.footer{margin-top:2rem;text-align:center;font-size:11px;color:var(--text3)}
</style>
</head>
<body>

<h1>Invoice fetch agent — performance dashboard</h1>
<p class="subtitle" id="subtitle"></p>
<p class="date-range" id="daterange"></p>

<div class="tab-bar" id="tabs">
  <button class="active" data-tab="overview">Overview</button>
  <button data-tab="merchants">Merchant success rates</button>
  <button data-tab="composition">Testing composition</button>
  <button data-tab="rawdata">Raw data</button>
</div>

<!-- TAB 1: OVERVIEW -->
<div class="tab-content active" id="tab-overview">
  <div class="metrics" id="metrics"></div>
  <div class="charts">
    <div class="panel">
      <div class="panel-title">Outcome distribution</div>
      <div style="position:relative;width:220px;height:220px;margin:0 auto"><canvas id="donut" width="220" height="220"></canvas></div>
      <div id="donut-legend" style="margin-top:12px"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Daily attempts and success rate</div>
      <div style="position:relative;width:100%;height:220px"><canvas id="dailyChart"></canvas></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">Failure funnel (absolute counts)</div>
    <div style="position:relative;width:100%;height:200px"><canvas id="funnel"></canvas></div>
  </div>
</div>

<!-- TAB 2: MERCHANT SUCCESS -->
<div class="tab-content" id="tab-merchants">
  <div class="header-row">
    <div class="panel-title" style="margin-bottom:0">Outcome breakdown by merchant</div>
    <div class="controls">
      <button class="active" data-f="top">Top 20 by volume</button>
      <button data-f="success">Highest success</button>
      <button data-f="blocked">Most blocked</button>
      <button data-f="all">All merchants</button>
    </div>
  </div>
  <div id="bars"></div>
  <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:11px;color:var(--text2)" id="bar-legend"></div>
</div>

<!-- TAB 3: COMPOSITION -->
<div class="tab-content" id="tab-composition">
  <div class="seg-grid" id="seg-cards"></div>
  <div class="charts">
    <div class="panel">
      <div class="panel-title">Testing composition (overall)</div>
      <div style="position:relative;width:200px;height:200px;margin:0 auto"><canvas id="segDonut" width="200" height="200"></canvas></div>
      <div id="seg-legend" style="margin-top:12px"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Daily volume by segment</div>
      <div style="position:relative;width:100%;height:220px"><canvas id="segDaily"></canvas></div>
    </div>
  </div>
</div>


<!-- TAB 4: RAW DATA -->
<div class="tab-content" id="tab-rawdata">
  <div class="header-row">
    <div class="panel-title" style="margin-bottom:0">Account-level data</div>
    <div class="controls" id="raw-filters">
      <button class="active" data-rf="all">All (40)</button>
      <button data-rf="payhawk_live">Payhawk live</button>
      <button data-rf="customer_live">Customer live</button>
      <button data-rf="internal">Internal</button>
      <button data-rf="external_testing">External testing</button>
    </div>
  </div>
  <div style="overflow-x:auto">
    <table id="acct-table" style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
      <thead>
        <tr id="acct-header" style="position:sticky;top:0;background:var(--surface);z-index:1"></tr>
      </thead>
      <tbody id="acct-body"></tbody>
    </table>
  </div>
  <div style="margin-top:1.5rem">
    <div class="header-row">
      <div class="panel-title" style="margin-bottom:0">Merchant-level data</div>
      <div style="position:relative">
        <input type="text" id="merchant-search" placeholder="Search merchants..." style="font-family:var(--font);font-size:12px;padding:5px 12px 5px 28px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);width:200px;outline:none">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3)">&#x1F50D;</span>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table id="merch-table" style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
        <thead>
          <tr id="merch-header" style="position:sticky;top:0;background:var(--surface);z-index:1"></tr>
        </thead>
        <tbody id="merch-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer" id="footer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js">

const segBadge = seg => {
  const c = SEGCOL[seg] || '#888';
  return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;background:${c}22;color:${c}">${SEGLBL[seg]||seg}</span>`;
};

const thStyle = 'text-align:left;padding:8px 10px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;font-size:11px';
const tdStyle = 'padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap';

// Account table
const acctCols = [
  {key:'id',label:'Account ID',fmt:v=>v.replace(/_[a-f0-9]{8}$/,'').replaceAll('_',' ')},
  {key:'seg',label:'Segment',fmt:v=>segBadge(v)},
  {key:'a',label:'Attempts',fmt:v=>v},
  {key:'p',label:'Merchants',fmt:v=>v},
  {key:'s',label:'Success',fmt:(v,r)=>r.a?`<span style="color:${COL.s}">${v}</span> <span style="color:var(--text3)">(${Math.round(100*v/r.a)}%)</span>`:'0'},
  {key:'l',label:'Login',fmt:v=>v||''},
  {key:'r',label:'Reconnect',fmt:v=>v||''},
  {key:'ca',label:'Captcha',fmt:v=>v||''},
  {key:'f',label:'Failed',fmt:v=>v||''},
  {key:'b',label:'Blocked',fmt:v=>v||''},
  {key:'first',label:'First seen',fmt:v=>v.slice(5)},
  {key:'last',label:'Last seen',fmt:v=>v.slice(5)}
];

document.getElementById('acct-header').innerHTML = acctCols.map(c => `<th style="${thStyle}" data-sort="${c.key}">${c.label}</th>`).join('');

let acctSort = {key:'a',dir:-1};
function renderAcctTable(filter) {
  let data = filter==='all' ? [...ACCTS] : ACCTS.filter(a=>a.seg===filter);
  data.sort((a,b) => {
    const av=a[acctSort.key], bv=b[acctSort.key];
    if(typeof av==='number') return (av-bv)*acctSort.dir;
    return String(av).localeCompare(String(bv))*acctSort.dir;
  });
  document.getElementById('acct-body').innerHTML = data.map(r =>
    '<tr>' + acctCols.map(c => `<td style="${tdStyle}">${c.fmt(r[c.key],r)}</td>`).join('') + '</tr>'
  ).join('');
}
renderAcctTable('all');

document.getElementById('acct-header').addEventListener('click', e => {
  const th = e.target.closest('th');
  if(!th) return;
  const k = th.dataset.sort;
  acctSort = {key:k, dir: acctSort.key===k ? -acctSort.dir : -1};
  const activeFilter = document.querySelector('#raw-filters button.active').dataset.rf;
  renderAcctTable(activeFilter);
});

document.getElementById('raw-filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('#raw-filters button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAcctTable(btn.dataset.rf);
});

// Merchant table
const merchCols = [
  {key:'n',label:'Merchant'},
  {key:'a',label:'Attempts'},
  {key:'s',label:'Success %',fmt:(v,r)=>`<span style="color:${COL.s};font-weight:500">${v}%</span>`},
  {key:'l',label:'Login %'},
  {key:'r',label:'Reconnect %'},
  {key:'ca',label:'Captcha %'},
  {key:'f',label:'Failed %'},
  {key:'b',label:'Blocked %'}
];

document.getElementById('merch-header').innerHTML = merchCols.map(c => `<th style="${thStyle}" data-msort="${c.key}">${c.label}</th>`).join('');

let merchSort = {key:'a',dir:-1};
let merchFilter = '';

function renderMerchTable() {
  let data = [...D];
  if(merchFilter) data = data.filter(d => d.n.toLowerCase().includes(merchFilter));
  data.sort((a,b) => {
    const av=a[merchSort.key], bv=b[merchSort.key];
    if(typeof av==='number') return (av-bv)*merchSort.dir;
    return String(av).localeCompare(String(bv))*merchSort.dir;
  });
  document.getElementById('merch-body').innerHTML = data.map(r =>
    '<tr>' + merchCols.map(c => {
      const v = r[c.key];
      const display = c.fmt ? c.fmt(v,r) : (typeof v==='number' && c.key!=='a' ? (v||'') : v);
      return `<td style="${tdStyle}">${display}</td>`;
    }).join('') + '</tr>'
  ).join('');
}
renderMerchTable();

document.getElementById('merch-header').addEventListener('click', e => {
  const th = e.target.closest('th');
  if(!th) return;
  const k = th.dataset.msort;
  merchSort = {key:k, dir: merchSort.key===k ? -merchSort.dir : -1};

const segBadge = seg => {
  const c = SEGCOL[seg] || '#888';
  return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;background:${c}22;color:${c}">${SEGLBL[seg]||seg}</span>`;
};

const thStyle = 'text-align:left;padding:8px 10px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;font-size:11px';
const tdStyle = 'padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap';

// Account table
const acctCols = [
  {key:'id',label:'Account ID',fmt:v=>v.replace(/_[a-f0-9]{8}$/,'').replaceAll('_',' ')},
  {key:'seg',label:'Segment',fmt:v=>segBadge(v)},
  {key:'a',label:'Attempts',fmt:v=>v},
  {key:'p',label:'Merchants',fmt:v=>v},
  {key:'s',label:'Success',fmt:(v,r)=>r.a?`<span style="color:${COL.s}">${v}</span> <span style="color:var(--text3)">(${Math.round(100*v/r.a)}%)</span>`:'0'},
  {key:'l',label:'Login',fmt:v=>v||''},
  {key:'r',label:'Reconnect',fmt:v=>v||''},
  {key:'ca',label:'Captcha',fmt:v=>v||''},
  {key:'f',label:'Failed',fmt:v=>v||''},
  {key:'b',label:'Blocked',fmt:v=>v||''},
  {key:'first',label:'First seen',fmt:v=>v.slice(5)},
  {key:'last',label:'Last seen',fmt:v=>v.slice(5)}
];

document.getElementById('acct-header').innerHTML = acctCols.map(c => `<th style="${thStyle}" data-sort="${c.key}">${c.label}</th>`).join('');

let acctSort = {key:'a',dir:-1};
function renderAcctTable(filter) {
  let data = filter==='all' ? [...ACCTS] : ACCTS.filter(a=>a.seg===filter);
  data.sort((a,b) => {
    const av=a[acctSort.key], bv=b[acctSort.key];
    if(typeof av==='number') return (av-bv)*acctSort.dir;
    return String(av).localeCompare(String(bv))*acctSort.dir;
  });
  document.getElementById('acct-body').innerHTML = data.map(r =>
    '<tr>' + acctCols.map(c => `<td style="${tdStyle}">${c.fmt(r[c.key],r)}</td>`).join('') + '</tr>'
  ).join('');
}
renderAcctTable('all');

document.getElementById('acct-header').addEventListener('click', e => {
  const th = e.target.closest('th');
  if(!th) return;
  const k = th.dataset.sort;
  acctSort = {key:k, dir: acctSort.key===k ? -acctSort.dir : -1};
  const activeFilter = document.querySelector('#raw-filters button.active').dataset.rf;
  renderAcctTable(activeFilter);
});

document.getElementById('raw-filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('#raw-filters button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAcctTable(btn.dataset.rf);
});

// Merchant table
const merchCols = [
  {key:'n',label:'Merchant'},
  {key:'a',label:'Attempts'},
  {key:'s',label:'Success %',fmt:(v,r)=>`<span style="color:${COL.s};font-weight:500">${v}%</span>`},
  {key:'l',label:'Login %'},
  {key:'r',label:'Reconnect %'},
  {key:'ca',label:'Captcha %'},
  {key:'f',label:'Failed %'},
  {key:'b',label:'Blocked %'}
];

document.getElementById('merch-header').innerHTML = merchCols.map(c => `<th style="${thStyle}" data-msort="${c.key}">${c.label}</th>`).join('');

let merchSort = {key:'a',dir:-1};
let merchFilter = '';

function renderMerchTable() {
  let data = [...D];
  if(merchFilter) data = data.filter(d => d.n.toLowerCase().includes(merchFilter));
  data.sort((a,b) => {
    const av=a[merchSort.key], bv=b[merchSort.key];
    if(typeof av==='number') return (av-bv)*merchSort.dir;
    return String(av).localeCompare(String(bv))*merchSort.dir;
  });
  document.getElementById('merch-body').innerHTML = data.map(r =>
    '<tr>' + merchCols.map(c => {
      const v = r[c.key];
      const display = c.fmt ? c.fmt(v,r) : (typeof v==='number' && c.key!=='a' ? (v||'') : v);
      return `<td style="${tdStyle}">${display}</td>`;
    }).join('') + '</tr>'
  ).join('');
}
renderMerchTable();

document.getElementById('merch-header').addEventListener('click', e => {
  const th = e.target.closest('th');
  if(!th) return;
  const k = th.dataset.msort;
  merchSort = {key:k, dir: merchSort.key===k ? -merchSort.dir : -1};
  renderMerchTable();
});

document.getElementById('merchant-search').addEventListener('input', e => {
  merchFilter = e.target.value.toLowerCase();
  renderMerchTable();
});

</script>
</body>
</html>
